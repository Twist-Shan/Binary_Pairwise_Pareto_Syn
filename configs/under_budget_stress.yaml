name: under_budget_stress
base_seed: 271828

algorithms:
  VB-EGE-capped:
    delta: 0.05
    sample_const: 2.0
    threshold_const: 4.0
    log_const: 4.0
    max_phases: 40
  UniformFocalBorda: {}
  UniformPairwiseBT-MLE:
    ridge_lambda: 1.0e-8
    fallback_ridge_lambda: 1.0e-4
    max_abs_theta: 20.0
    max_iter: 1000
    tol: 1.0e-9
    allocation_scheme: balanced_random
  UniformPairwiseBT-BordaPlugIn:
    allocation_scheme: balanced_random

experiments:
