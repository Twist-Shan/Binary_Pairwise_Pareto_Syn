name: correlated_arena
base_seed: 987654

algorithms:
  VB-EGE-practical:
    delta: 0.05
    sample_const: 2.0
    threshold_const: 4.0
    log_const: 4.0
    max_phases: 45
  UniformFocalBorda-FC:
    delta: 0.05
    sample_const: 2.0
    threshold_const: 4.0
    log_const: 4.0
    max_rounds: 45
  UniformPairwiseBT-MLE-FC:
    delta: 0.05
    sample_const: 2.0
    threshold_const: 4.0
    log_const: 4.0
    max_rounds: 45
    ridge_lambda: 1.0e-8
    fallback_ridge_lambda: 1.0e-4
    allocation_scheme: balanced_random
  UniformPairwiseBT-BordaPlugIn-FC:
    delta: 0.05
    sample_const: 2.0
    threshold_const: 4.0
    log_const: 4.0
    max_rounds: 45

experiments:
  - id: corr_arena4_K32
    generator: correlated_arena_like
    n_reps: 300
    grid:
      K: [32]
      d: [4]
      s: [8]
      rho: [0.0, 0.6, 0.9]
      margin_low: [0.08]
      margin_high: [0.25]
      latent_rank: [3]
      alpha: [0.7]

  - id: corr_arena10_K64
    generator: correlated_arena_like
    n_reps: 300
    grid:
      K: [64]
      d: [10]
      s: [16]
      rho: [0.0, 0.3, 0.6, 0.85, 0.95]
      margin_low: [0.06]
      margin_high: [0.20]
      latent_rank: [3]
      alpha: [0.7]

plots:
  - tau_vs_rho
  - norm_tau_vs_rho
  - baseline_ratio_vs_rho
  - pair_cell_coverage_vs_rho
  - delta_min_B_vs_rho
