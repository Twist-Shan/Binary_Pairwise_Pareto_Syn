name: fixed_budget_benchmarks
base_seed: 12345

algorithms:
  UniformFocalBorda: {}
  UniformPairwiseBT-MLE:
    ridge_lambda: 1.0e-8
    fallback_ridge_lambda: 1.0e-4
    max_abs_theta: 20.0
    max_iter: 1000
    tol: 1.0e-9
    allocation_scheme: balanced_random
  UniformPairwiseBT-BordaPlugIn: {}
  VB-EGE-capped:
    delta: 0.05
    sample_const: 2.0
    threshold_const: 4.0
    log_const: 4.0
    max_phases: 40

experiments:
  - id: fb_convex2d
    generator: convex_frontier_2d
    params: {K: 60, d: 2, s: 15}
    n_reps: 500
    budgets: [2000, 5000, 10000, 20000, 50000, 100000]

  - id: fb_arena4_small
    generator: arena_tradeoff_frontier
    params: {K: 32, d: 4, s: 8, margin_low: 0.08, margin_high: 0.25, alpha: 0.7}
    n_reps: 500
    budgets: [5000, 10000, 20000, 40000, 80000, 160000]

  - id: fb_arena4_medium
    generator: arena_tradeoff_frontier
    params: {K: 64, d: 4, s: 12, margin_low: 0.08, margin_high: 0.25, alpha: 0.7}
    n_reps: 300
    budgets: [10000, 20000, 50000, 100000, 200000, 500000]

  - id: fb_arena10_medium
    generator: arena_tradeoff_frontier
    params: {K: 64, d: 10, s: 16, margin_low: 0.06, margin_high: 0.20, alpha: 0.7}
    n_reps: 300
    budgets: [25000, 50000, 100000, 200000, 500000, 1000000]

  - id: fb_arena10_large
    generator: arena_tradeoff_frontier
    params: {K: 128, d: 10, s: 24, margin_low: 0.06, margin_high: 0.20, alpha: 0.7}
    n_reps: 200
    budgets: [100000, 200000, 500000, 1000000, 2000000, 5000000]

  - id: fb_witness4
    generator: unique_witness_d
    params: {K: 40, d: 4, s: 8, q_per_p: 4, margin_low: 0.04, margin_high: 0.16}
    n_reps: 500
    budgets: [5000, 10000, 20000, 50000, 100000, 200000]

  - id: fb_witness10
    generator: unique_witness_d
    params: {K: 80, d: 10, s: 16, q_per_p: 4, margin_low: 0.035, margin_high: 0.14}
    n_reps: 300
    budgets: [50000, 100000, 200000, 500000, 1000000, 2000000]

  - id: fb_twogroup10_medium
    generator: highdim_two_group
    params: {K_low: 48, K_high: 16, d: 10}
    n_reps: 300
    budgets: [25000, 50000, 100000, 200000, 500000, 1000000]

  - id: fb_twogroup10_large
    generator: highdim_two_group
    params: {K_low: 96, K_high: 32, d: 10}
    n_reps: 200
    budgets: [100000, 200000, 500000, 1000000, 2000000, 5000000]
