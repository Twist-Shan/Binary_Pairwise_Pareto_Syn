name: mle_ablation
base_seed: 777

algorithm: UniformPairwiseBT-MLE

mle_grid:
  allocation_scheme: [balanced_random, with_replacement]
  ridge_lambda: [0.0, 1.0e-8, 1.0e-6, 1.0e-4]
  init: [zeros, borda_logit]
  fallback_ridge_lambda: [1.0e-4]

experiments:
  - id: mle_ablate_arena4_small
    generator: arena_tradeoff_frontier
    params: {K: 32, d: 4, s: 8, margin_low: 0.08, margin_high: 0.25, alpha: 0.7}
    n_reps: 300
    budgets: [5000, 10000, 20000, 40000, 80000]

  - id: mle_ablate_arena10_medium
    generator: arena_tradeoff_frontier
    params: {K: 64, d: 10, s: 16, margin_low: 0.06, margin_high: 0.20, alpha: 0.7}
    n_reps: 200
    budgets: [25000, 50000, 100000, 200000, 500000]
